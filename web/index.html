<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dynamic Continuous Analysis Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --muted:#6b7280; --border:#e5e7eb; --tab:#e5e7eb; --active:#2563eb; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
    header { display:flex; gap:16px; align-items:baseline; margin-bottom:16px; }
    h1 { margin:0; }
    .muted { color: var(--muted); }
    .card { border:1px solid var(--border); border-radius:12px; padding:16px; margin:12px 0; }
    .grid { display:grid; gap:8px; grid-template-columns: repeat(3, 1fr); }
    .grid .card { margin:0; }
    a { color:#2563eb; text-decoration:none; }
    table { border-collapse: collapse; width:100%; }
    th, td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:left; }
    input[type="search"], input[type="datetime-local"] { padding:8px; border:1px solid var(--border); border-radius:8px; margin:8px 8px 8px 0;}
    code { background:#f7f7f7; padding:2px 4px; border-radius:6px; }
    .nowrap { white-space: nowrap; }
    .pill { background:#f3f4f6; border-radius:999px; padding:2px 8px; }
    .breadcrumb a { color: inherit; }
    .tabs { display:flex; gap:8px; border-bottom:1px solid var(--border); margin-bottom:16px; }
    .tab { padding:8px 12px; border:1px solid var(--tab); border-bottom:none; border-radius:8px 8px 0 0; background:#fafafa; }
    .tab.active { background:white; border-color: var(--active); color: var(--active); font-weight:600; }
    .controls { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    svg circle { transition: opacity 0.2s ease, stroke-width 0.2s ease; }
    svg circle:hover { opacity: 0.8; stroke: #1d4ed8; stroke-width: 1.5; }
    .commit-tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .commit-tooltip strong { display: block; margin-bottom: 4px; }
    .commit-tooltip span { display: block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" integrity="sha256-LAEQ8l5cCwX6yFT1s1m8QX7wKjIvmyuHJ0v+qK2qTn0=" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1><a href="#/now">Dynamic Continuous Analysis Dashboard</a></h1>
    <span class="muted" id="updated"></span>
  </header>

  <div class="tabs">
    <a id="tab-now" class="tab" href="#/now">Monitoring</a>
    <a id="tab-hist" class="tab" href="#/hist">History</a>
    <a id="tab-pr" class="tab" href="#/pr">PR Analysis</a>
    <a id="tab-survey" class="tab" href="#/survey">Survey</a>
  </div>

  <div id="app"></div>

  <script>
    const el = (t, p={}, ...kids) => {
      const n = document.createElement(t);
      for (const [k,v] of Object.entries(p||{})) {
        if (k === "class") n.className = v;
        else if (k === "html") n.innerHTML = v;
        else n.setAttribute(k, v);
      }
      kids.flat().forEach(k => n.append(k?.nodeType ? k : document.createTextNode(k ?? "")));
      return n;
    };

    // Create SVG elements correctly (HTML createElement won't render SVG tags)
    const svgEl = (t, p={}, ...kids) => {
      const n = document.createElementNS("http://www.w3.org/2000/svg", t);
      for (const [k,v] of Object.entries(p||{})) {
        n.setAttribute(k, v);
      }
      kids.flat().forEach(k => n.append(k?.nodeType ? k : document.createTextNode(k ?? "")));
      return n;
    };

    const fmtUTC = (epoch) => epoch ? new Date(epoch*1000).toUTCString() : "—";
    
    const fmtET = (epoch) => {
      if (!epoch) return "—";
      const d = new Date(epoch * 1000);
      // Convert to Eastern Time
      const etString = d.toLocaleString("en-US", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
      return etString;
    };

    let DATA = null;

    async function load() {
      const res = await fetch("./data.json", {cache:"no-store"});
      DATA = await res.json();
      const d = new Date((DATA.generated_at||0)*1000);
      document.getElementById("updated").textContent = `Last updated: ${d.toUTCString()}`;
      route();
    }

    window.addEventListener("hashchange", route);
    window.addEventListener("load", load);

    function setActiveTab(kind){
      document.getElementById("tab-now").classList.toggle("active", kind==="now");
      document.getElementById("tab-hist").classList.toggle("active", kind==="hist");
      document.getElementById("tab-pr").classList.toggle("active", kind==="pr");
      document.getElementById("tab-survey").classList.toggle("active", kind==="survey");
    }

    function pickDataset(kind){
      if (!DATA || !DATA.datasets) return null;
      if (kind === "hist") return DATA.datasets.history;
      if (kind === "pr") return DATA.datasets.pr;
      return DATA.datasets.monitoring;
    }

    function route() {
      if (!DATA) return;
      const app = document.getElementById("app");
      app.innerHTML = "";
      const parts = location.hash.replace(/^#\/?/, "").split("/").filter(Boolean);
      const kind = (parts[0]==="hist")
        ? "hist"
        : (parts[0]==="pr")
          ? "pr"
          : (parts[0]==="survey")
            ? "survey"
            : "now";

      setActiveTab(kind);
      const ds = kind === "survey" ? null : pickDataset(kind);
      const tail = parts.slice(1);

      // Hide the top-level tabs only on survey project/detail pages,
      // keep them visible on the root survey page.
      const tabsEl = document.querySelector(".tabs");
      if (tabsEl) {
        const hideTabsForSurvey = (kind === "survey" && tail.length > 0);
        tabsEl.style.display = hideTabsForSurvey ? "none" : "flex";
      }

      if (tail.length === 0) {
        if (kind === "pr") return renderPrHome(app, ds);
        if (kind === "survey") return renderSurveyHome(app);
        return renderHome(app, ds, kind);
      }
      if (kind === "survey" && tail[0] === "p" && tail[1] && tail.length === 2) {
        return renderSurveyProject(app, tail[1]);
      }
      if (kind === "survey" && tail[0] === "p" && tail[1] && tail[2] === "hist" && tail.length === 3) {
        return renderSurveyHistory(app, tail[1]);
      }
      if (kind === "survey" && tail[0] === "p" && tail[1] && tail[2] === "c" && tail[3] && tail.length === 4) {
        return renderCommit(app, {projects: getSurveyProjects()}, "hist", tail[1], tail[3]);
      }
      if (kind === "survey" && tail[0] === "p" && tail[1] && tail[2] === "c" && tail[3] && tail[4] === "v" && tail[5]) {
        return renderViolation(app, {projects: getSurveyProjects()}, "hist", tail[1], tail[3], tail[5]);
      }
      if (kind === "pr" && tail[0] === "p" && tail[1] && tail[2] === "r" && tail[3] && tail[4] === "v" && tail[5]) return renderPrViolation(app, ds, tail[1], tail[3], tail[5]);
      if (kind === "pr" && tail[0] === "p" && tail[1] && tail[2] === "r" && tail[3] && tail.length === 4) return renderPrDetail(app, ds, tail[1], tail[3]);
      if (kind === "pr" && tail[0] === "p" && tail[1] && tail.length === 2) return renderPrProject(app, ds, tail[1]);
      if (tail[0] === "p" && tail[1] && tail.length === 2) return renderProject(app, ds, kind, tail[1]);
      if (tail[0] === "p" && tail[1] && tail[2] === "c" && tail[3] && tail.length === 4) {
        // If a commit link came from Survey history, it uses the /hist route,
        // but the data lives under the survey dataset. Fall back gracefully.
        if (kind === "hist" && (!ds || !findProject(ds, tail[1])) && findSurveyProject(tail[1])) {
          return renderCommit(app, {projects: getSurveyProjects()}, "hist", tail[1], tail[3]);
        }
        return renderCommit(app, ds, kind, tail[1], tail[3]);
      }
      if (tail[0] === "p" && tail[1] && tail[2] === "c" && tail[3] && tail[4] === "v" && tail[5]) {
        if (kind === "hist" && (!ds || !findProject(ds, tail[1])) && findSurveyProject(tail[1])) {
          return renderViolation(app, {projects: getSurveyProjects()}, "hist", tail[1], tail[3], tail[5]);
        }
        return renderViolation(app, ds, kind, tail[1], tail[3], tail[5]);
      }

      app.append(el("div", {}, "Not found"));
    }

    // Survey helpers
    function getSurveyProjects() {
      if (!DATA) return [];
      // Prefer structured dataset from collect.py: datasets.survey.projects
      if (DATA.datasets && DATA.datasets.survey) {
        const ds = DATA.datasets.survey;
        if (Array.isArray(ds.projects)) return ds.projects;
        if (Array.isArray(ds)) return ds;
      }
      // Backward-compat: flat survey_data array at top-level
      if (Array.isArray(DATA.survey_data)) return DATA.survey_data;
      return [];
    }

    function findSurveyProject(slug) {
      const projects = getSurveyProjects();
      return projects.find(p => p.slug === slug);
    }

    // --------- Common helpers ---------
    function breadcrumb(items){
      const nav = el("nav", {class:"breadcrumb muted"});
      items.forEach((it, i) => {
        nav.append(it.href ? el("a", {href: it.href}, it.text) : el("span", {}, it.text));
        if (i < items.length-1) nav.append(" / ");
      });
      return nav;
    }
    function findProject(ds, slug){ return (ds.projects||[]).find(p => p.slug === slug); }
    function findCommit(p, sha){ return (p.commits||[]).find(c => c.sha === sha); }
    function findViolation(c, id){ return (c.violations||[]).find(v => v.id === id); }
    function findPr(p, prNum) { const n = parseInt(prNum, 10); return (p.prs||[]).find(pr => pr.pr_number === n || pr.pr_number === prNum); }

    // Classify a PR violation into CUT / dependency / Python buckets based on its file path
    // CUT: project files (default)
    // dependency: path contains "site-packages"
    // Python: path contains "python3.12"
    function classifyPrViolation(v) {
      const p = (v.file || "").toLowerCase();
      const isDep = p.includes("site-packages");
      const isPy = p.includes("python3.12");
      const isCut = !isDep && !isPy;
      return { isCut, isDep, isPy };
    }

    // Classify a (survey/commit) violation into CUT / library / Python buckets
    // CUT: project files (default)
    // library: path contains "site-packages"
    // Python: path contains "python3.12" or "pythonmop"
    function classifyViolation(v) {
      const p = (v.file || "").toLowerCase();
      const isLib = p.includes("site-packages");
      const isPy = (p.includes("python3.12") && !isLib) || p.includes("pythonmop");
      const isCut = !isLib && !isPy;
      return { isCut, isLib, isPy };
    }

    const SPECS_BASE_URL = "https://github.com/SoftEngResearch/pymop/tree/main/specs-new";

    function renderSpecLinks(specs) {
      const s = String(specs || "").trim();
      if (!s) return el("span", {class:"muted"}, "—");
      const parts = s.split(";").map(x => x.trim()).filter(Boolean);
      const wrap = el("span", {});
      parts.forEach((name, i) => {
        if (i > 0) wrap.append("; ");
        const specUrl = `${SPECS_BASE_URL}/${encodeURIComponent(name)}.py`;
        wrap.append(el("a", {href: specUrl, target:"_blank", class:"nowrap", title: specUrl}, name));
      });
      return wrap;
    }

    // --------- Views ---------
    function renderSurveyHistory(app, slug) {
      // Reuse the history view layout, but backed by the survey dataset.
      // IMPORTANT: Use kind="survey" so commit links stay within /survey routes.
      const ds = {projects: getSurveyProjects()};
      return renderProject(app, ds, "survey", slug);
    }
    function renderSurveyHome(app) {
      // Only show survey projects that actually have data (at least one commit)
      const projects = getSurveyProjects().filter(p => (p.commits || []).length > 0);
      if (!projects.length) {
        return app.append(el("div", {}, "No survey data"));
      }

      const summaryParts = [
        el("strong", {}, "Total survey projects: "), String(projects.length)
      ];
      app.append(el("div", {class:"card"}, ...summaryParts));

      const grid = el("div", {class:"grid"});

      projects.forEach(p => {
        grid.append(el("div", {class:"card"},
          el("h3", {}, el("a", {href:`#/survey/p/${p.slug}`}, p.full_name || p.slug || "Project"))
        ));
      });

      app.append(grid);
    }

    function renderSurveyProject(app, slug) {
      const p = findSurveyProject(slug);
      if (!p) return app.append(el("div", {}, "Survey project not found"));

      app.append(breadcrumb([{href:"#/survey", text:"Survey"}, {text: p.full_name || p.slug}]));

      // Top-right button to let participants view earlier commits (optional)
      const historyBtnRow = el("div", {style:"display:flex; justify-content:flex-end; margin:8px 0;"},
        el("a", {
          href: `#/survey/p/${p.slug}/hist`,
          class: "pill",
          style: "cursor:pointer;"
        }, "See earlier commits →")
      );
      app.append(historyBtnRow);

      // Project Metadata (same style as other tabs)
      const urlBoxContent = [
        el("h3", {style:"margin-top:0; margin-bottom:12px;"}, "Project Metadata")
      ];
      urlBoxContent.push(
        el("div", {style:"display:flex; align-items:center; gap:8px; margin-bottom:8px;"},
          el("span", {}, "Project: "),
          el("span", {}, p.full_name || p.slug || "Project")
        )
      );
      urlBoxContent.push(
        el("div", {style:"display:flex; align-items:center; gap:8px;"},
          el("span", {}, "Project URL: "),
          p.url
            ? el("a", {
                href: p.url,
                target: "_blank",
                style: "color:#2563eb; word-break:break-all;"
              }, p.url)
            : el("span", {class:"muted"}, "—")
        )
      );
      app.append(el("div", {class:"card", style:"width:100%; margin-bottom:6px; background:#f8f9fa; box-sizing:border-box;"}, ...urlBoxContent));

      // Survey: show the latest commit based on current_commit_timestamp.
      // We still keep all commits in the dataset for the history view.
      const commits = (p.commits || []).filter(c => c.current_commit_timestamp);
      const latest = commits.reduce((best, c) => {
        if (!best) return c;
        const tBest = best.current_commit_timestamp;
        const tCur  = c.current_commit_timestamp;
        return tCur > tBest ? c : best;
      }, null);
      const latestSha = latest ? (latest.current_commit_sha || latest.sha || "") : "";

      // Violation type filters (multi-select)
      const filterState = { cut: true, lib: true, py: true };
      const filterRow = el("div", {class:"controls", style:"margin:8px 0; gap:12px; align-items:center;"},
        el("span", {class:"muted"}, "Show: ")
      );
      const mkCheck = (key, label) => {
        const cb = el("input", {type:"checkbox"});
        cb.checked = !!filterState[key];
        const labelSpan = el("span", {}, label);
        cb.addEventListener("change", () => {
          filterState[key] = cb.checked;
          draw();
        });
        return { cb, labelSpan, node: el("label", {style:"display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;"},
          cb,
          labelSpan
        )};
      };
      const cutToggle = mkCheck("cut", "CUT");
      const libToggle = mkCheck("lib", "Library");
      const pyToggle = mkCheck("py", "Python");
      filterRow.append(cutToggle.node, libToggle.node, pyToggle.node);
      app.append(filterRow);

      const infoCard = el("div", {class:"card"});
      app.append(infoCard);

      const input = el("input", {type:"search", placeholder:"Filter by file/spec…", style:"width:320px;"});
      app.append(input);

      const table = el("table",
        {},
        el("thead", {}, el("tr", {},
          el("th", {}, "File"),
          el("th", {}, "Line"),
          el("th", {}, "Source URL"),
          el("th", {}, "Specification"),
          el("th", {}, "Triggering test"),
          el("th", {}, "Total Occurrences")
        )),
        el("tbody")
      );
      const tbody = table.querySelector("tbody");
      app.append(table);

      function draw() {
        const sha = latestSha;
        const c = latest;
        let violations = [];

        infoCard.innerHTML = "";
        if (!c) {
          infoCard.append(el("div", {}, "No commit data"));
        } else {
          const ts = c.current_commit_timestamp || 0;
          const allViolations = c.all_violations || c.violations || [];

          // Compute counts per type (shown on toggles)
          let cutCount = 0, libCount = 0, pyCount = 0;
          allViolations.forEach(v => {
            const cls = classifyViolation(v);
            if (cls.isCut) cutCount += 1;
            if (cls.isLib) libCount += 1;
            if (cls.isPy) pyCount += 1;
          });
          cutToggle.labelSpan.textContent = `CUT (${cutCount})`;
          libToggle.labelSpan.textContent = `Library (${libCount})`;
          pyToggle.labelSpan.textContent = `Python (${pyCount})`;

          // Apply type filters
          violations = allViolations.filter(v => {
            const cls = classifyViolation(v);
            return (filterState.cut && cls.isCut) || (filterState.lib && cls.isLib) || (filterState.py && cls.isPy);
          });

          const numCurrent = violations.length;

          // Build commit URL directly from the project URL + "/commit/" + SHA
          let commitUrl = null;
          if (p.url && sha) {
            const base = p.url.replace(/\.git$/i, "").replace(/\/+$/, "");
            commitUrl = `${base}/commit/${sha}`;
          }

          const metaGrid = el("div", {
            style: "display:grid; grid-template-columns: 170px 1fr; gap:8px 12px; align-items:baseline;"
          });
          const addRow = (label, valueNodeOrText) => {
            metaGrid.append(
              el("div", {class:"muted", style:"font-weight:600;"}, label),
              valueNodeOrText?.nodeType ? valueNodeOrText : el("div", {}, String(valueNodeOrText ?? "—"))
            );
          };

          const commitMessage = c.current_commit_message || "x";
          const numFiles = (c.num_python_file_changed !== undefined && c.num_python_file_changed !== null)
            ? String(c.num_python_file_changed)
            : "—";

          const parseTime = (val) => {
            if (!val || val === "x" || val === "" || val === "nan" || val === null || val === undefined) {
              return -5.0;
            }
            const num = parseFloat(val);
            return isNaN(num) ? -5.0 : num;
          };

          const origTime = c.end_to_end_times ? parseTime(c.end_to_end_times.original) : -5.0;
          const pymopTime = c.end_to_end_times ? parseTime(c.end_to_end_times.pymop) : -5.0;
          const dylinTime = c.end_to_end_times ? parseTime(c.end_to_end_times.dylin) : -5.0;

          addRow("Commit", el("div", {}, sha ? el("code", {}, sha) : "—"));
          addRow("Commit Message", el("div", {}, commitMessage));
          addRow("Commit URL", el("div", {}, commitUrl
            ? el("a", {href: commitUrl, target: "_blank", title: commitUrl, style:"color:#2563eb; word-break:break-all;"}, "Open on GitHub")
            : el("span", {class:"muted"}, "—")
          ));
          addRow("Timestamp (ET)", el("div", {}, ts ? fmtET(ts) : "—"));
          addRow("Files Changed", el("div", {}, numFiles));
          addRow("Original end-to-end test time", el("div", {}, origTime > -5 ? origTime.toFixed(2) + "s" : "x"));
          addRow("PyMOP end-to-end test time", el("div", {}, pymopTime > -5 ? pymopTime.toFixed(2) + "s" : "x"));
          addRow("Dylin end-to-end test time", el("div", {}, dylinTime > -5 ? dylinTime.toFixed(2) + "s" : "x"));
          addRow("Unique Violations", el("div", {},
            el("span", {style:"color:#6b7280;"}, String(numCurrent))
          ));

          infoCard.append(metaGrid);
        }

        tbody.innerHTML = "";
        if (!c || !Array.isArray(violations)) return;

        const q = (input.value || "").toLowerCase();
        const qFiltered = violations.filter(v =>
          (v.file || "").toLowerCase().includes(q) ||
          String(v.line).includes(q) ||
          (v.specs || "").toLowerCase().includes(q)
        );

        const sections = [
          { key: "cut", label: "CUT", match: (v) => classifyViolation(v).isCut },
          { key: "lib", label: "Library", match: (v) => classifyViolation(v).isLib },
          { key: "py", label: "Python/PyMOP source", match: (v) => classifyViolation(v).isPy },
        ];

        const baseRepoUrl = p.url ? p.url.replace(/\.git$/i, "").replace(/\/+$/, "") : null;
        const appendSection = (label, items) => {
          if (!items.length) return;
          tbody.append(el("tr", {},
            el("td", {colspan:"6", style:"padding-top:14px; font-weight:700; color:#374151; background:#fafafa; border-bottom:1px solid var(--border);"}, label)
          ));
          items.forEach(v => {
            const cls = classifyViolation(v);
            const filePath = String(v.file || "").replace(/^\/+/, "");
            const lineNum = v.line != null ? Number(v.line) : null;
            const sourceUrl = (cls.isCut && baseRepoUrl && sha && filePath && lineNum)
              ? `${baseRepoUrl}/blob/${sha}/${filePath}#L${lineNum}`
              : null;
            tbody.append(el("tr", {},
              el("td", {class:"nowrap"}, v.file),
              el("td", {}, String(v.line)),
              el("td", {}, sourceUrl
                ? el("a", {href: sourceUrl, target: "_blank", class:"nowrap"}, "Open")
                : el("span", {class:"muted"}, "N/A")
              ),
              el("td", {}, renderSpecLinks(v.specs)),
              el("td", {class:"muted"}, "to be added..."),
              el("td", {}, String(v.count || 0))
            ));
          });
        };

        // Render in desired order: CUT, Library, Python source code
        sections.forEach(s => appendSection(s.label, qFiltered.filter(s.match)));
      }

      // For survey, there is no commit selector; always show the latest commit.
      input.addEventListener("input", draw);
      draw();
    }
    function renderHome(app, ds, kind){
      if (!ds) return app.append(el("div", {}, "No data"));
      const totals = ds.totals || {commits:0, locations:0};
      const summaryParts = [
        el("strong", {}, "Total projects: "), String((ds.projects||[]).length),
        " • ", el("strong", {}, "Total commits: "), String(totals.commits),
        " • ", el("strong", {}, "Total unique violations: "), String(totals.locations)
      ];
      
      // Add totals for new and removed violations after first commit
      if (typeof totals.new_locations_after_first === "number" && typeof totals.removed_locations_after_first === "number") {
        summaryParts.push(" • ", el("strong", {}, "New violations after first commit: "), String(totals.new_locations_after_first));
        summaryParts.push(" • ", el("strong", {}, "Removed violations after first commit: "), String(totals.removed_locations_after_first));
      }
      
      app.append(el("div", {class:"card"}, ...summaryParts));

      const grid = el("div", {class:"grid"});
      (ds.projects||[]).forEach(p => {
        // Calculate total unique violations across all commits since first commit
        const allCommits = p.commits || [];
        const allViolationIds = new Set();
        allCommits.forEach(cc => {
          (cc.violations || []).forEach(v => {
            if (v.id) allViolationIds.add(v.id);
          });
        });
        const uniqueLocations = allViolationIds.size;
        // Latest commit timestamp for quick glance
        const lastTs = allCommits.reduce((m,c)=> Math.max(m, c.ts||0), 0);
        
        // First line: Total commits, 7-day commits (for monitoring), and Unique violations
        let pillsLine1 = [];
        if (kind === "hist") {
          pillsLine1 = [
            el("span", {class:"pill"}, `Total commits: ${allCommits.length}`),
            el("span", {class:"pill"}, `Unique violations: ${uniqueLocations}`)
          ];
        } else {
          // Monitoring runs: calculate 7-day commits
          const nowEpoch = Math.floor(Date.now() / 1000);
          const weekAgo = nowEpoch - 7*24*60*60;
          const commitsWeek = allCommits.filter(cc => (cc.current_commit_timestamp || 0) >= weekAgo);
          pillsLine1 = [
            el("span", {class:"pill"}, `Total commits: ${allCommits.length}`),
            el("span", {class:"pill"}, `7-day commits: ${commitsWeek.length}`),
            el("span", {class:"pill"}, `Unique violations: ${uniqueLocations}`)
          ];
        }
        
        // Second line: New after first and Removed after first
        let pillsLine2 = [];
        if (kind === "hist") {
          // History runs: use same delta-based calculation as History Stats table
          const commitsAfterFirst = allCommits.length > 1 ? allCommits.slice(1) : [];
          const newAfterFirst = commitsAfterFirst.reduce((sum, cc) => sum + (cc.num_new_violations || 0), 0);
          const removedAfterFirst = commitsAfterFirst.reduce((sum, cc) => sum + (cc.num_old_violations || 0), 0);
          
          pillsLine2 = [
            el("span", {class:"pill"}, `New after first: ${newAfterFirst}`),
            el("span", {class:"pill"}, `Removed after first: ${removedAfterFirst}`)
          ];
        } else {
          // Monitoring runs: use same delta-based logic as "All commits" stats table
          const commitsAfterFirst = allCommits.length > 1 ? allCommits.slice(1) : [];
          const newAfterFirst = commitsAfterFirst.reduce((sum, cc) => sum + (cc.num_new_violations || 0), 0);
          const removedAfterFirst = commitsAfterFirst.reduce((sum, cc) => sum + (cc.num_old_violations || 0), 0);
          
          pillsLine2 = [
            el("span", {class:"pill"}, `New after first: ${newAfterFirst}`),
            el("span", {class:"pill"}, `Removed after first: ${removedAfterFirst}`)
          ];
        }
        
        const pillsContainer = el("div", {style:"margin-top:8px;"});
        // First line
        pillsLine1.forEach((pill, i) => {
          if (i > 0) pillsContainer.append(" ");
          pillsContainer.append(pill);
        });
        // Second line
        if (pillsLine2.length > 0) {
          pillsContainer.append(el("div", {style:"margin-top:12px;"}));
          pillsLine2.forEach((pill, i) => {
            if (i > 0) pillsContainer.append(" ");
            pillsContainer.append(pill);
          });
        }
        
        grid.append(el("div", {class:"card"},
          el("h3", {}, el("a", {href:`#/${kind}/p/${p.slug}`}, p.full_name)),
          el("div", {class:"muted"}, `Latest artifact: ${p.latest_artifact_name || "N/A"}`),
          el("div", {class:"muted"}, `Latest commit time: ${fmtUTC(lastTs)}`),
          pillsContainer
        ));
      });
      app.append(grid);
    }

            // Plot times if needed

              const maxTime = validTimes.length > 0 ? Math.max(...validTimes) : 1;
              const minTime = validTimes.length > 0 ? Math.min(...validTimes) : 0;
              const yMaxTime = maxTime * 1.16;
              const yMinTime = Math.min(-1, minTime - 1);
              
              const toYpTime = v => {
                if (v <= -5) return Mp.t + innerHp * 0.95; // Show -5 near bottom
                const normalized = (v - yMinTime) / (yMaxTime - yMinTime);

              const timeTicks = 5;

                plotElements.push(svgEl("text", {x:String(Wp - Mp.r + 3), y:String(y + 4), fill:"#6b7280", "font-size":"10", "text-anchor":"start"}, val.toFixed(1)));

              // Add color legend for time plots (only for times_only and both)

          // Initial plot

        }

      // Check if any commits have coverage data (hide coverage for survey history)

      const hasCoverage = kind !== "survey" && commits.some(c => c.coverage !== undefined && c.coverage !== null);

      function parseLocalDT(val){

        const d = new Date(val);

      }

      function draw(){
        tbody.innerHTML = "";
        const q = (search.value||"").toLowerCase();
        const fromEpoch = parseLocalDT(from.value);
        const toEpoch = parseLocalDT(to.value);

        commits
          .filter(c => !q || c.sha.toLowerCase().includes(q))
          .filter(c => fromEpoch==null || (c.ts||0) >= fromEpoch)
          .filter(c => toEpoch==null || (c.ts||0) <= toEpoch)
          .forEach((c, idx, filteredCommits) => {

            const numCurrent = (c.counts && typeof c.counts.locations === "number") ? c.counts.locations : (c.num_current_violations ?? 0);
            const numNew = c.num_new_violations ?? 0;
            const numOld = c.num_old_violations ?? 0;

            // Build violation display: grey current, red delta +, green delta -
            const violationParts = [el("span", {style:"color:#6b7280;"}, String(numCurrent))];

            // Show deltas only if non-zero, or if both are zero show grey zero
            if (numNew > 0 && numOld > 0) {
              violationParts.push(el("span", {style:"color:#dc2626; margin-left:8px;"}, `(+${numNew})`));
              violationParts.push(el("span", {style:"color:#16a34a; margin-left:4px;"}, `(-${numOld})`));
            } else if (numNew > 0) {
              violationParts.push(el("span", {style:"color:#dc2626; margin-left:8px;"}, `(+${numNew})`));
            } else if (numOld > 0) {
              violationParts.push(el("span", {style:"color:#16a34a; margin-left:8px;"}, `(-${numOld})`));
            } else if (numNew === 0 && numOld === 0) {
              violationParts.push(el("span", {style:"color:#6b7280; margin-left:8px;"}, "(0)"));
            }

            // Only use current_commit_timestamp, show "x" if not available
            const displayTimestamp = c.current_commit_timestamp ? fmtET(c.current_commit_timestamp) : "x";
            
            // Truncate commit message if too long
            const commitMessage = c.current_commit_message || "";
            const shortMessage = commitMessage.length > 100 ? commitMessage.substring(0, 97) + "..." : commitMessage;
            
            const rowCells = [
              el("td", {style:"min-width:80px;"}, el("a", {href:`#/${kind}/p/${p.slug}/c/${c.current_commit_sha || c.sha}`, class:"nowrap"}, (c.current_commit_sha || c.sha).slice(0,7))),
              el("td", {title: commitMessage, style:"max-width:600px;"}, shortMessage),
              el("td", {style:"min-width:140px;"}, displayTimestamp)
            ];
            
            // Add Files Changed and Monitoring Time columns for history-like runs
            if (isHistoryLike) {
              const numFiles = c.num_python_file_changed !== undefined && c.num_python_file_changed !== null 
                ? String(c.num_python_file_changed) 
                : "—";
              rowCells.push(el("td", {style:"min-width:100px;"}, numFiles));
              
              // Calculate Monitoring Time (sum of pymop + dylin)
              // Treat -5 as 0 for both pymop and dylin (so failures don't affect the sum)
              const parseTime = (val) => {
                if (!val || val === "x" || val === "" || val === "nan" || val === null || val === undefined) {
                  return -5.0;
                }
                const num = parseFloat(val);
                return isNaN(num) ? -5.0 : num;
              };
              
              let monitoringTime = "—";
              if (c.end_to_end_times) {
                let pymopTime = parseTime(c.end_to_end_times.pymop);
                let dylinTime = parseTime(c.end_to_end_times.dylin);
                // Treat -5 as 0 for both (so failures don't affect the sum)
                if (pymopTime <= -5) {
                  pymopTime = 0;
                }
                if (dylinTime <= -5) {
                  dylinTime = 0;
                }
                
                // Calculate sum: pymop + dylin
                const sum = pymopTime + dylinTime;
                if (sum > 0) {
                  monitoringTime = sum.toFixed(2) + "s";
                } else {
                  // Both were -5 (now 0), so sum is 0
                  monitoringTime = "—";
                }
              }
              rowCells.push(el("td", {style:"min-width:120px;"}, monitoringTime));
            }
            
            rowCells.push(el("td", {style:"min-width:120px; text-align:left;"}, ...violationParts));
            
            if (hasCoverage) {
              const coverageDisplay = (c.coverage !== undefined && c.coverage !== null) 
                ? (typeof c.coverage === "number" ? `${c.coverage.toFixed(2)}%` : String(c.coverage))
                : "—";
              rowCells.push(el("td", {}, coverageDisplay));
            }
            
            tbody.append(el("tr", {}, ...rowCells));
          });
      }
      from.addEventListener("change", draw);
      to.addEventListener("change", draw);
      search.addEventListener("input", draw);
      draw();
    }

    function renderCommit(app, ds, kind, slug, sha){
      const p = findProject(ds, slug);
      if (!p) return app.append(el("div", {}, "Project not found"));
      const c = findCommit(p, sha);
      if (!c) return app.append(el("div", {}, "Commit not found"));

      app.append(breadcrumb([
        {href:`#/${kind}`, text:"Home"},
        {href:`#/${kind}/p/${p.slug}`, text:p.full_name},
        {text: sha}
      ]));

      // --- SAFER HEADER (avoid crashes if counts is missing) ---
      // Use counts.locations (calculated after filtering) instead of num_current_violations from CSV
      const numCurrent = (c.counts && typeof c.counts.locations === "number") ? c.counts.locations : (c.num_current_violations ?? 0);
      const numNew = c.num_new_violations ?? 0;
      const numOld = c.num_old_violations ?? 0;

      const commitMessage = c.current_commit_message || "x";
      const displayTimestamp = c.current_commit_timestamp ? fmtET(c.current_commit_timestamp) : "x";

      const metaGrid = el("div", {
        style: "display:grid; grid-template-columns: 170px 1fr; gap:8px 12px; align-items:baseline;"
      });
      const addRow = (label, valueNodeOrText) => {
        metaGrid.append(
          el("div", {class:"muted", style:"font-weight:600;"}, label),
          valueNodeOrText?.nodeType ? valueNodeOrText : el("div", {}, String(valueNodeOrText ?? "—"))
        );
      };

      addRow("Commit", el("div", {}, el("code", {}, sha)));
      addRow("Commit Message", el("div", {}, commitMessage));
      addRow("Timestamp (ET)", el("div", {}, displayTimestamp));
      
      // Add GitHub URL and Files Changed for history runs
      if (kind === "hist") {
        // Add GitHub URL
        if (c.github_url && c.github_url.trim()) {
          addRow("Commit URL", el("div", {},
            el("a", {
              href: c.github_url,
              target: "_blank",
              title: c.github_url,
              style: "color:#2563eb; word-break:break-all;"
            }, "Open on GitHub")
          ));
        }
        
        // Add Files Changed
        const numFiles = c.num_python_file_changed !== undefined && c.num_python_file_changed !== null 
          ? String(c.num_python_file_changed) 
          : "—";
        addRow("Files Changed", el("div", {}, numFiles));
        
        // Add End-to-end times
        const parseTime = (val) => {
          if (!val || val === "x" || val === "" || val === "nan" || val === null || val === undefined) {
            return -5.0;
          }
          const num = parseFloat(val);
          return isNaN(num) ? -5.0 : num;
        };
        
        if (c.end_to_end_times) {
          const origTime = parseTime(c.end_to_end_times.original);
          const pymopTime = parseTime(c.end_to_end_times.pymop);
          const dylinTime = parseTime(c.end_to_end_times.dylin);

          addRow("Original end-to-end test time", el("div", {}, origTime > -5 ? origTime.toFixed(2) + "s" : "x"));
          addRow("PyMOP end-to-end test time", el("div", {}, pymopTime > -5 ? pymopTime.toFixed(2) + "s" : "x"));
          addRow("Dylin end-to-end test time", el("div", {}, dylinTime > -5 ? dylinTime.toFixed(2) + "s" : "x"));
        } else {
          addRow("Original end-to-end test time", el("div", {}, "x"));
          addRow("PyMOP end-to-end test time", el("div", {}, "x"));
          addRow("Dylin end-to-end test time", el("div", {}, "x"));
        }
      }
      
      // Add GitHub compare URL for monitoring runs
      if (kind === "now") {
        // Find previous commit (older) to generate compare URL
        const allCommits = p.commits || [];
        const currentSha = c.current_commit_sha || c.sha;
        const currentIdx = allCommits.findIndex(oc => (oc.current_commit_sha || oc.sha) === currentSha);
        const previousCommit = currentIdx > 0 ? allCommits[currentIdx - 1] : null;
        
        // Generate GitHub compare URL
        if (p.url && currentSha) {
          const urlMatch = p.url.match(/github\.com\/([^\/]+\/[^\/]+)/);
          if (urlMatch) {
            const repoPath = urlMatch[1];
            let githubUrl;
            if (previousCommit) {
              const previousSha = previousCommit.current_commit_sha || previousCommit.sha;
              if (previousSha) {
                githubUrl = `https://github.com/${repoPath}/compare/${previousSha}...${currentSha}`;
              } else {
                githubUrl = `https://github.com/${repoPath}/commit/${currentSha}`;
              }
            } else {
              githubUrl = `https://github.com/${repoPath}/commit/${currentSha}`;
            }
            addRow("GitHub", el("div", {},
              el("a", {
                href: githubUrl,
                target: "_blank",
                title: githubUrl,
                style: "color:#2563eb; word-break:break-all;"
              }, "Open on GitHub")
            ));
          }
        }
      }
      
      // Build violation display: grey current, red delta +, green delta -
      const violationParts = [el("span", {style:"color:#6b7280;"}, String(numCurrent))];
      if (numNew > 0 && numOld > 0) {
        violationParts.push(el("span", {style:"color:#dc2626; margin-left:8px;"}, `(+${numNew})`));
        violationParts.push(el("span", {style:"color:#16a34a; margin-left:4px;"}, `(-${numOld})`));
      } else if (numNew > 0) {
        violationParts.push(el("span", {style:"color:#dc2626; margin-left:8px;"}, `(+${numNew})`));
      } else if (numOld > 0) {
        violationParts.push(el("span", {style:"color:#16a34a; margin-left:8px;"}, `(-${numOld})`));
      } else if (numNew === 0 && numOld === 0) {
        violationParts.push(el("span", {style:"color:#6b7280; margin-left:8px;"}, "(0)"));
      }
      addRow("Unique Violations", el("div", {}, ...violationParts));
      
      // Add coverage if available (hide on survey pages)
      if (kind !== "survey" && c.coverage !== undefined && c.coverage !== null) {
        const coverageDisplay = typeof c.coverage === "number" ? `${c.coverage.toFixed(2)}%` : String(c.coverage);
        addRow("Coverage", el("div", {}, coverageDisplay));
      }
      
      app.append(el("div", {class:"card"}, metaGrid));
      // ---------------------------------------------------------
      // --- SAFER TABLE (avoid crashes if violations is missing) ---
      const typeState = { cut: true, lib: true, py: true };
      const typeRow = el("div", {class:"controls", style:"margin:8px 0; gap:12px; align-items:center;"},
        el("span", {class:"muted"}, "Show: ")
      );
      const mkType = (key, label) => {
        const cb = el("input", {type:"checkbox"});
        cb.checked = !!typeState[key];
        const labelSpan = el("span", {}, label);
        cb.addEventListener("change", () => {
          typeState[key] = cb.checked;
          draw();
        });
        return { cb, labelSpan, node: el("label", {style:"display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;"},
          cb,
          labelSpan
        )};
      };
      // Prefer showing the full current_violations-derived list when available (survey),
      // otherwise fall back to the existing violations list (history/monitoring).
      const baseViolations = c.all_violations || c.violations || [];
      let cutTotal = 0, libTotal = 0, pyTotal = 0;
      baseViolations.forEach(v => {
        const cls = classifyViolation(v);
        if (cls.isCut) cutTotal += 1;
        if (cls.isLib) libTotal += 1;
        if (cls.isPy) pyTotal += 1;
      });
      const cutT = mkType("cut", `CUT (${cutTotal})`);
      const libT = mkType("lib", `Library (${libTotal})`);
      const pyT = mkType("py", `Python (${pyTotal})`);
      typeRow.append(cutT.node, libT.node, pyT.node);
      app.append(typeRow);

      const input = el("input", {type:"search", placeholder:"Filter by file/spec…", style:"width:320px;"});
      app.append(input);

      const table = el("table",
        {},
        el("thead", {}, el("tr", {},
          el("th", {}, "File"),
          el("th", {}, "Line"),
          el("th", {}, "Source URL"),
          el("th", {}, "Type"),
          el("th", {}, "Specification"),
          el("th", {}, "Triggering test"),
          el("th", {}, "Total Occurrences")
        )),
        el("tbody")
      );
      const tbody = table.querySelector("tbody");

      function draw(){
        tbody.innerHTML = "";
        const q = (input.value||"").toLowerCase();
        const filtered = (baseViolations || [])
          .filter(v => {
            const cls = classifyViolation(v);
            return (typeState.cut && cls.isCut) || (typeState.lib && cls.isLib) || (typeState.py && cls.isPy);
          })
          .filter(v =>
            v.file.toLowerCase().includes(q) ||
            String(v.line).includes(q) ||
            (v.specs||"").toLowerCase().includes(q)
          );

        const sections = [
          { label: "CUT", match: (v) => classifyViolation(v).isCut },
          { label: "Library", match: (v) => classifyViolation(v).isLib },
          { label: "Python/PyMOP source", match: (v) => classifyViolation(v).isPy },
        ];

        const baseRepoUrl = p.url ? p.url.replace(/\.git$/i, "").replace(/\/+$/, "") : null;
        const appendSection = (label, items) => {
          if (!items.length) return;
          tbody.append(el("tr", {},
            el("td", {colspan:"7", style:"padding-top:14px; font-weight:700; color:#374151; background:#fafafa; border-bottom:1px solid var(--border);"}, label)
          ));
          items
            .slice()
            .sort((a, b) => {
              const fa = (a.file || "");
              const fb = (b.file || "");
              if (fa !== fb) return fa.localeCompare(fb);
              return (Number(a.line) || 0) - (Number(b.line) || 0);
            })
            .forEach(v => {
              const cls = classifyViolation(v);
              const typeLabel = cls.isCut ? "CUT" : cls.isLib ? "Library" : "Python";
              const filePath = String(v.file || "").replace(/^\/+/, "");
              const lineNum = v.line != null ? Number(v.line) : null;
              const sourceUrl = (cls.isCut && baseRepoUrl && sha && filePath && lineNum)
                ? `${baseRepoUrl}/blob/${sha}/${filePath}#L${lineNum}`
                : null;
              tbody.append(el("tr", {},
                el("td", {class:"nowrap"}, v.file),
                el("td", {}, String(v.line)),
                el("td", {}, sourceUrl
                  ? el("a", {href: sourceUrl, target: "_blank", class:"nowrap"}, "Open")
                  : el("span", {class:"muted"}, "N/A")
                ),
                el("td", {}, typeLabel),
                el("td", {}, renderSpecLinks(v.specs)),
                el("td", {class:"muted"}, "to be added..."),
                el("td", {}, String(v.count || 0))
              ));
            });
        };

        sections.forEach(s => appendSection(s.label, filtered.filter(s.match)));
      }
      input.addEventListener("input", draw);
      draw();
      app.append(table);
    }

    function renderViolation(app, ds, kind, slug, sha, id){
      const p = findProject(ds, slug);
      if (!p) return app.append(el("div", {}, "Project not found"));
      const c = findCommit(p, sha);
      if (!c) return app.append(el("div", {}, "Commit not found"));
      const v = findViolation(c, id);
      if (!v) return app.append(el("div", {}, "Violation not found"));

      app.append(breadcrumb([
        {href:`#/${kind}`, text:"Home"},
        {href:`#/${kind}/p/${p.slug}`, text:p.full_name},
        {href:`#/${kind}/p/${p.slug}/c/${sha}`, text: sha},
        {text: v.id}
      ]));

      const violationInfo = [
        el("div", {}, el("strong", {}, "Project: "), p.full_name),
        el("div", {}, el("strong", {}, "Commit: "), el("code", {}, sha)),
        el("div", {}, el("strong", {}, "File: "), v.file, " : ", String(v.line)),
        el("div", {}, el("strong", {}, "Specs: "), v.specs || "—"),
        el("div", {}, el("strong", {}, "Total Occurrences: "), String(v.count || 0))
      ];
      
      // Add coverage if available for this commit
      if (kind !== "survey" && c.coverage !== undefined && c.coverage !== null) {
        const coverageDisplay = typeof c.coverage === "number" ? `${c.coverage.toFixed(2)}%` : String(c.coverage);
        violationInfo.push(el("div", {}, el("strong", {}, "Coverage: "), coverageDisplay));
      }
      
      app.append(el("div", {class:"card"}, ...violationInfo));

      const bd = v.breakdown || [];
      const table = el("table",
        {},
        el("thead", {}, el("tr", {}, el("th", {}, "Spec"), el("th", {}, "Count"))),
        el("tbody", {}, ...(bd.length ? bd.map(b =>
          el("tr", {}, el("td", {}, b.spec), el("td", {}, String(b.count)))
        ) : [el("tr", {}, el("td", {colspan:"2"}, el("span", {class:"muted"}, "No spec entries found.")))]))
      );
      app.append(el("div", {class:"card"},
        el("h3", {}, "Spec breakdown"),
        table
      ));
    }
  </script>
</body>
</html>
